interface:
  display_name: "Workflow Supervisor"
  short_description: "Run lean, strict, or planning-only supervised workflows"
  default_prompt: "Route first: if Workflow Supervisor was not explicitly invoked and the task is a small clear edit with obvious files and acceptance, do not invoke it; execute directly. Use $workflow-supervisor only after this route check. If $workflow-supervisor was explicitly invoked, select the execution profile first: lean_work_unit_runner for large bounded backlogs and low-footprint direct execution, strict_full_workflow for ambiguous/high-risk/delegated work, or planning_only for sequencing without implementation. Ask required intake questions and stop until the user explicitly answers all missing items. Do not infer path, mode, delegation, final disposition, or boundaries from vague keywords. In lean mode, keep work units and a compact ledger, avoid subagents unless explicitly authorized, run targeted checks, and escalate unclear or risky units. In strict mode, create a source-requirement coverage ledger and SPEC review gate before work units, preserve source requirements in acceptance rows, and do not hide unimplemented material requirements in residual risks or future work. Prefer one-shot portable delegation when it satisfies the work. If native threads or subagents are used, record each native resource id, call the native close action such as close_agent after terminal report or blocker capture, and block final outcome if any native worker lacks a close result."

policy:
  allow_implicit_invocation: false
